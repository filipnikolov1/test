name: Build and Push to DockerHub

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: filipn123/test:latest

      - name: Notify Launchpad
        run: |
          TIMESTAMP=$(date +%s%3N)
          PAYLOAD="{\"image\":\"filipn123/test:latest\",\"app_name\":\"test\",\"repo_url\":\"https://github.com/${{ github.repository }}.git\",\"timestamp\":${TIMESTAMP}}"
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | sed 's/^.* //')"
          curl -sv --retry 3 -X POST "${{ secrets.LAUNCHPAD_URL }}" \                                                                                                                                              
            -H "Content-Type: application/json" \
            -H "ngrok-skip-browser-warning: true" \
            -H "X-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"
