name: Deploy to Vector

on:
   push:
      branches: [master]

jobs:
   build-push-notify:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - id: meta
           run: |
              SHORT_SHA="${GITHUB_SHA:0:7}"                                                                                                                                                 
              echo "image=${{ secrets.DOCKERHUB_USERNAME }}/test:git-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

         - name: Login to DockerHub
           uses: docker/login-action@v3
           with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}

         - name: Build and push
           uses: docker/build-push-action@v6
           with:
              context: .
              push: true
              tags: |
                 ${{ secrets.DOCKERHUB_USERNAME }}/test:latest
                 ${{ steps.meta.outputs.image }}

         - name: Notify Vector deploy-hook
           env:
              HOOK_URL: ${{ secrets.VECTOR_DEPLOY_HOOK_URL }}
              HOOK_KEY: ${{ secrets.VECTOR_DEPLOY_KEY }}
              IMAGE: ${{ steps.meta.outputs.image }}
              SHA: ${{ github.sha }}
              MSG: ${{ toJSON(github.event.head_commit.message) }}
              BRANCH: ${{ github.ref_name }}
              AUTHOR: ${{ github.event.head_commit.author.name }}
           run: |
              PAYLOAD=$(jq -n \                                                                                                                                                             
                --arg app "test" \
                --arg image "$IMAGE" \                                                     
                --arg sha "$SHA" \                                                                                                                                                          
                --argjson msg "$MSG" \
                --arg branch "$BRANCH" \                                                                                                                                                    
                --arg author "$AUTHOR" \
                --arg ts "$(date +%s)000" \                                                                                                                                                 
                --arg repo "https://github.com/${{ github.repository }}" \                 
                '{                                                                                                                                                                          
                  app_name: $app,
                  image: $image,                                                                                                                                                            
                  repo_url: $repo,                                                         
                  port: 3000,                                                                                                                                                               
                  commit_sha: $sha,                                                        
                  commit_message: $msg,                                                                                                                                                     
                  commit_author: $author,                                                  
                  branch: $branch,                                                                                                                                                          
                  timestamp: ($ts | tonumber)
                }')                                                                                                                                                                         
              SIG="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$HOOK_KEY" -hex | awk '{print $2}')"
              curl -fsS -X POST "$HOOK_URL" \                                                                                                                                               
                -H "X-Signature-256: $SIG" \
                -H "Content-Type: application/json" \                                                                                                                                       
                -d "$PAYLOAD"
